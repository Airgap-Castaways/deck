version: v1alpha1
phases:
  - name: prepare
    steps:
      - id: stage-hosted-assets
        kind: DownloadFile
        spec:
          items:
            - source:
                path: files/input.txt
              fetch:
                sources:
                  - type: local
                    path: seed
              outputPath: files/hosted-e2e/input.txt
            - source:
                path: files/archive.tgz
              fetch:
                sources:
                  - type: local
                    path: seed
              outputPath: files/hosted-e2e/archive.tgz
