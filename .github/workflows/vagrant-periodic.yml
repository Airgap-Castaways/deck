name: Vagrant Periodic

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      scenario_set:
        description: Scenario set to execute
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - full

permissions:
  contents: read

concurrency:
  group: vagrant-periodic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      scenario_set: ${{ steps.select.outputs.scenario_set }}
      matrix: ${{ steps.select.outputs.matrix }}
      run_id: ${{ steps.select.outputs.run_id }}

    steps:
      - name: Select scenario set
        id: select
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SCENARIO_SET: ${{ github.event.inputs.scenario_set }}
        run: |
          scenario_set="nightly"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_SCENARIO_SET}" ]; then
            scenario_set="${INPUT_SCENARIO_SET}"
          fi

          case "${scenario_set}" in
            nightly)
              matrix='{"include":[{"scenario":"k8s-control-plane-bootstrap"},{"scenario":"k8s-worker-join"}]}'
              ;;
            full)
              matrix='{"include":[{"scenario":"k8s-control-plane-bootstrap"},{"scenario":"k8s-worker-join"},{"scenario":"k8s-node-reset"},{"scenario":"k8s-upgrade"}]}'
              ;;
            *)
              echo "unsupported scenario set: ${scenario_set}"
              exit 1
              ;;
          esac

          printf 'scenario_set=%s\n' "${scenario_set}" >> "${GITHUB_OUTPUT}"
          printf 'matrix=%s\n' "${matrix}" >> "${GITHUB_OUTPUT}"
          printf 'run_id=gh-%s-%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_OUTPUT}"

  scenarios:
    name: ${{ matrix.scenario }}
    needs: plan
    runs-on:
      - self-hosted
      - linux
      - vagrant
      - libvirt
    timeout-minutes: 180

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    env:
      DECK_VAGRANT_RUN_ID: ${{ needs.plan.outputs.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Show runner tooling
        shell: bash
        run: |
          uname -a
          go version
          vagrant --version
          virsh --version
          vagrant plugin list

      - name: Run canonical Vagrant scenario
        shell: bash
        run: |
          bash test/e2e/vagrant/run-scenario.sh --scenario "${{ matrix.scenario }}" --fresh

      - name: Summarize scenario artifacts
        if: always()
        shell: bash
        run: |
          art_dir="test/artifacts/runs/${{ matrix.scenario }}/${DECK_VAGRANT_RUN_ID}"
          echo "## ${{ matrix.scenario }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- scenario set: \`${{ needs.plan.outputs.scenario_set }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- run id: \`${DECK_VAGRANT_RUN_ID}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- artifact dir: \`${art_dir}\`" >> "${GITHUB_STEP_SUMMARY}"

          python3 - <<'PY' "${art_dir}" >> "${GITHUB_STEP_SUMMARY}"
          from pathlib import Path
          import json
          import sys

          art_dir = Path(sys.argv[1])
          result_path = art_dir / "result.json"
          summary_path = art_dir / "run-summary.txt"

          if result_path.is_file():
              data = json.loads(result_path.read_text(encoding="utf-8"))
              print(f"- result: `{data.get('result', 'unknown')}`")
              print(f"- started: `{data.get('startedAt', 'unknown')}`")
              print(f"- finished: `{data.get('finishedAt', 'unknown')}`")
              evidence = data.get("evidence", {})
              if evidence:
                  print("- evidence files:")
                  for key, value in sorted(evidence.items()):
                      print(f"  - `{key}` -> `{value}`")
          else:
              print("- result: `missing result.json`")
              if summary_path.is_file():
                  print("- run summary:")
                  for line in summary_path.read_text(encoding="utf-8").splitlines():
                      if line.strip():
                          print(f"  - `{line.strip()}`")

          log_dir = art_dir / "logs"
          if log_dir.is_dir():
              error_logs = sorted(p.name for p in log_dir.glob("error-*.log") if p.stat().st_size > 0)
              if error_logs:
                  print("- non-empty error logs:")
                  for name in error_logs:
                      print(f"  - `{name}`")
          PY

      - name: Force cleanup after scenario
        if: always()
        shell: bash
        run: |
          bash test/e2e/vagrant/run-scenario.sh \
            --scenario "${{ matrix.scenario }}" \
            --step cleanup \
            --art-dir "test/artifacts/runs/${{ matrix.scenario }}/${DECK_VAGRANT_RUN_ID}" \
            --cleanup || true

      - name: Upload Vagrant artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vagrant-${{ matrix.scenario }}-${{ needs.plan.outputs.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            test/artifacts/runs/${{ matrix.scenario }}/${{ needs.plan.outputs.run_id }}
