steps:
  - id: apply-offline-repo-config-debian
    kind: RepositoryConfigure
    spec:
      format: apt
      path: /etc/apt/sources.list.d/offline.list
      replaceExisting: true
      repositories:
        - type: deb
          trusted: true
          baseurl: http://{{ .vars.serverURL  }}/packages/apt/{{ .vars.release  }}
          suite: ./
  - id: refresh-apt-package-cache
    kind: RepositoryRefresh
    spec:
      manager: apt
      clean: true
      update: true
