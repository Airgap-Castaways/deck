steps:
  - id: reset-node
    kind: ResetKubeadm
    when: vars.allowDestructive == "true"
    spec:
      force: true
      criSocket: unix:///run/containerd/containerd.sock
      removePaths:
        - /etc/cni/net.d
        - /etc/kubernetes/pki
        - /var/lib/kubelet/pki
        - /var/lib/kubelet/plugins
        - /var/lib/kubelet/plugins_registry
        - /etc/kubernetes/manifests
      removeFiles:
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/bootstrap-kubelet.conf
        - /etc/kubernetes/admin.conf
        - /etc/kubernetes/controller-manager.conf
        - /etc/kubernetes/scheduler.conf
      cleanupContainers:
        - kube-apiserver
        - kube-controller-manager
        - kube-scheduler
        - etcd
      restartRuntimeService: containerd
      waitForRuntimeService: true
      waitForRuntimeReady: true
      waitForMissingManifestsGlob: /etc/kubernetes/manifests/*.yaml
      stopKubeletAfterReset: true
      verifyContainersAbsent:
        - kube-apiserver
        - kube-controller-manager
        - kube-scheduler
        - etcd
      reportFile: "{{ .vars.resetStatePath }}"
      reportResetReason: "{{ .vars.resetReason }}"
