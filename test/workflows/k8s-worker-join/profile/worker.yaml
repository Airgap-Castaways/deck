role: apply
version: v1alpha1
varImports:
  - ../../_shared/k8s/vars/common.yaml
  - ../vars/worker.yaml
phases:
  - name: install
    imports:
      - path: ../../_shared/k8s/apply/common/prereq.yaml
      - path: ../../_shared/k8s/apply/common/offline-repo-debian.yaml
        when: vars.osFamily == "debian"
      - path: ../../_shared/k8s/apply/common/offline-repo-rhel.yaml
        when: vars.osFamily == "rhel"
      - path: ../../_shared/k8s/apply/common/runtime-deps-debian.yaml
        when: vars.osFamily == "debian"
      - path: ../../_shared/k8s/apply/common/runtime-deps-rhel.yaml
        when: vars.osFamily == "rhel"
      - path: ../../_shared/k8s/apply/common/k8s-binaries.yaml
      - path: ../../_shared/k8s/apply/common/containerd-kubelet.yaml
      - path: ../apply/join.yaml
      - path: ../../_shared/k8s/apply/common/cni.yaml
    steps:
      - id: worker-summary
        apiVersion: deck/v1alpha1
        kind: RunCommand
        spec:
          command: ["true"]
