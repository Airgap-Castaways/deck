version: v1alpha1
vars:
  clusterName: upgrade
  enableBootstrap: "true"
phases:
  - name: host-prereqs
    imports:
      - path: k8s/prereq.yaml
      - path: repo/offline-repo-debian.yaml
      - path: k8s/runtime-deps-debian.yaml
  - name: runtime
    imports:
      - path: k8s/k8s-binaries.yaml
      - path: k8s/containerd-kubelet.yaml
  - name: bootstrap
    imports:
      - path: bootstrap.yaml
      - path: k8s/cni.yaml
  - name: upgrade-runtime
    steps:
      - id: install-upgrade-kubeadm
        kind: CopyFile
        spec:
          source:
            url: http://{{ .vars.serverURL }}/files/bin/linux/{{ .runtime.host.arch }}/upgrade/{{ .vars.upgradeKubernetesVersion }}/kubeadm
          path: /usr/bin/kubeadm
          mode: "0755"
      - id: install-upgrade-kubectl
        kind: CopyFile
        spec:
          source:
            url: http://{{ .vars.serverURL }}/files/bin/linux/{{ .runtime.host.arch }}/upgrade/{{ .vars.upgradeKubernetesVersion }}/kubectl
          path: /usr/bin/kubectl
          mode: "0755"
      - id: update-upgrade-pause-image
        kind: EditFile
        spec:
          path: /etc/containerd/config.toml
          backup: false
          edits:
            - op: replace
              match: registry.k8s.io/pause:3.9
              replaceWith: "{{ .vars.upgradePauseImage }}"
      - id: restart-containerd-for-upgrade
        kind: ManageService
        spec:
          name: containerd
          enabled: true
          state: restarted
  - name: upgrade
    steps:
      - id: upgrade-control-plane
        kind: UpgradeKubeadm
        spec:
          kubernetesVersion: "{{ .vars.upgradeKubernetesVersion }}"
          ignorePreflightErrors: [Swap, FileExisting-crictl, FileExisting-conntrack, FileExisting-socat]
          restartKubelet: false
      - id: stop-kubelet-for-upgrade
        kind: ManageService
        spec:
          name: kubelet
          enabled: true
          state: stopped
      - id: install-upgrade-kubelet
        kind: CopyFile
        spec:
          source:
            url: http://{{ .vars.serverURL }}/files/bin/linux/{{ .runtime.host.arch }}/upgrade/{{ .vars.upgradeKubernetesVersion }}/kubelet
          path: /usr/bin/kubelet
          mode: "0755"
      - id: start-kubelet-after-upgrade
        kind: ManageService
        spec:
          name: kubelet
          enabled: true
          state: started
      - id: upgrade-report
        kind: CheckCluster
        spec:
          timeout: 20m
          interval: 5s
          nodes:
            total: 1
            ready: 1
            controlPlaneReady: 1
          versions:
            targetVersion: "{{ .vars.upgradeKubernetesVersion }}"
            server: "{{ .vars.upgradeKubernetesVersion }}"
            kubelet: "{{ .vars.upgradeKubernetesVersion }}"
            reportPath: /tmp/deck/reports/upgrade-version.txt
          kubeSystem:
            readyNames:
              - etcd-control-plane
              - kube-apiserver-control-plane
              - kube-controller-manager-control-plane
              - kube-scheduler-control-plane
            readyPrefixMinimums:
              - prefix: coredns-
                minReady: 2
              - prefix: kube-proxy-
                minReady: 1
            reportPath: /tmp/deck/reports/kube-system-pods.txt
            jsonReportPath: /tmp/deck/reports/kube-system-pods.json
          fileAssertions:
            - path: /etc/containerd/config.toml
              contains: ["{{ .vars.upgradePauseImage }}"]
          reports:
            nodesPath: /tmp/deck/reports/upgrade-nodes.txt
            clusterNodesPath: /tmp/deck/reports/cluster-nodes.txt
