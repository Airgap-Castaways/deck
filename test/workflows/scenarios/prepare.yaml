role: prepare
version: v1alpha1
vars:
  kubernetesVersion: v1.30.1
  arch: amd64
  backendRuntime: auto
artifacts:
  files:
    - group: kubernetes-binaries
      targets:
        - arch: amd64
        - arch: arm64
      items:
        - id: kubelet
          source:
            url: https://dl.k8s.io/release/{{ .vars.kubernetesVersion }}/bin/linux/{{ .target.arch }}/kubelet
          output:
            path: bin/linux/{{ .target.arch }}/kubelet
            mode: "0755"
        - id: kubeadm
          source:
            url: https://dl.k8s.io/release/{{ .vars.kubernetesVersion }}/bin/linux/{{ .target.arch }}/kubeadm
          output:
            path: bin/linux/{{ .target.arch }}/kubeadm
            mode: "0755"
        - id: kubectl
          source:
            url: https://dl.k8s.io/release/{{ .vars.kubernetesVersion }}/bin/linux/{{ .target.arch }}/kubectl
          output:
            path: bin/linux/{{ .target.arch }}/kubectl
            mode: "0755"
        - id: crictl
          source:
            url: https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.30.0/crictl-v1.30.0-linux-{{ .target.arch }}.tar.gz
          output:
            path: bin/linux/{{ .target.arch }}/crictl.tar.gz
        - id: containerd
          source:
            url: https://github.com/containerd/containerd/releases/download/v1.7.18/containerd-1.7.18-linux-{{ .target.arch }}.tar.gz
          output:
            path: bin/linux/{{ .target.arch }}/containerd.tar.gz
        - id: runc
          source:
            url: https://github.com/opencontainers/runc/releases/download/v1.1.13/runc.{{ .target.arch }}
          output:
            path: bin/linux/{{ .target.arch }}/runc
            mode: "0755"
        - id: cni-plugins
          source:
            url: https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-{{ .target.arch }}-v1.5.1.tgz
          output:
            path: bin/linux/{{ .target.arch }}/cni-plugins.tgz
  images:
    - group: kubernetes-images
      items:
        - image: registry.k8s.io/kube-apiserver:{{ .vars.kubernetesVersion }}
        - image: registry.k8s.io/kube-controller-manager:{{ .vars.kubernetesVersion }}
        - image: registry.k8s.io/kube-scheduler:{{ .vars.kubernetesVersion }}
        - image: registry.k8s.io/kube-proxy:{{ .vars.kubernetesVersion }}
        - image: registry.k8s.io/pause:3.9
        - image: registry.k8s.io/etcd:3.5.12-0
        - image: registry.k8s.io/coredns/coredns:v1.11.1
  packages:
    - group: ubuntu2204-runtime-deps
      targets:
        - osFamily: debian
          release: ubuntu2204
          arch: amd64
      items:
        - name: containerd
        - name: containernetworking-plugins
      repo:
        type: apt-flat
        generate: true
      backend:
        mode: container
        runtime: "{{ .vars.backendRuntime }}"
        image: ubuntu:22.04
    - group: ubuntu2404-runtime-deps
      targets:
        - osFamily: debian
          release: ubuntu2404
          arch: amd64
      items:
        - name: containerd
        - name: containernetworking-plugins
      repo:
        type: apt-flat
        generate: true
      backend:
        mode: container
        runtime: "{{ .vars.backendRuntime }}"
        image: ubuntu:24.04
    - group: rocky9-runtime-deps
      targets:
        - osFamily: rhel
          release: rocky9
          arch: amd64
      items:
        - name: bash
      repo:
        type: yum
        generate: true
      backend:
        mode: container
        runtime: "{{ .vars.backendRuntime }}"
        image: rockylinux:9
