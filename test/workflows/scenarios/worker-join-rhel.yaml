version: v1alpha1
vars:
  clusterName: worker-join-rhel
  serverURL: 192.168.57.10:18080
  registryHost: 192.168.57.10:18080
  release: rocky9
  osFamily: rhel
  joinSource: cluster-file
  joinFile: /tmp/deck/join.txt
  applyReportPath: /tmp/deck/reports/worker-2-apply.txt
phases:
  - name: host-prereqs
    imports:
      - path: k8s/prereq.yaml
      - path: repo/offline-repo-debian.yaml
        when: runtime.host.os.family == "debian"
      - path: repo/offline-repo-rhel.yaml
        when: runtime.host.os.family == "rhel"
      - path: k8s/runtime-deps-debian.yaml
        when: runtime.host.os.family == "debian"
      - path: k8s/runtime-deps-rhel.yaml
        when: runtime.host.os.family == "rhel"
  - name: runtime
    imports:
      - path: k8s/k8s-binaries.yaml
      - path: k8s/containerd-kubelet.yaml
  - name: join
    imports:
      - path: worker-join.yaml
      - path: k8s/cni.yaml
  - name: verify
    steps:
      - id: verify-worker-kubelet-config
        kind: WaitForFile
        spec:
          path: /var/lib/kubelet/config.yaml
          type: file
          nonEmpty: true
          timeout: 2m
          interval: 2s
      - id: verify-worker-kubelet-service
        kind: WaitForService
        spec:
          name: kubelet
          timeout: 2m
          interval: 5s
      - id: write-worker-2-join-report
        kind: Command
        spec:
          timeout: 30s
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              mkdir -p /tmp/deck/reports
              printf 'ok\n' > /tmp/deck/reports/worker-2-apply.txt
