role: apply
version: v1alpha1
vars:
  clusterName: worker-join
  joinSource: cluster-file
  joinFile: /tmp/deck/join.txt
phases:
  - name: host-prereqs
    imports:
      - path: scenario/worker-host-prereqs.yaml
  - name: runtime
    imports:
      - path: scenario/worker-runtime.yaml
  - name: join
    imports:
      - path: scenario/worker-join.yaml
