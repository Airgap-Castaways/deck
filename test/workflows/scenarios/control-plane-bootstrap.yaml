version: v1alpha1
vars:
  clusterName: bootstrap-root
  enableBootstrap: "true"
  serverURL: 192.168.57.10:18080
  registryHost: 192.168.57.10:18080
  release: ubuntu2204
phases:
  - name: host-prereqs
    imports:
      - path: k8s/prereq.yaml
      - path: repo/offline-repo-debian.yaml
      - path: k8s/runtime-deps-debian.yaml
  - name: runtime
    imports:
      - path: k8s/k8s-binaries.yaml
      - path: k8s/containerd-kubelet.yaml
  - name: bootstrap
    imports:
      - path: bootstrap.yaml
      - path: k8s/cni.yaml
  - name: verify
    steps:
      - id: bootstrap-report
        kind: CheckKubernetesCluster
        spec:
          timeout: 10m
          interval: 5s
          nodes:
            total: 1
            ready: 1
            controlPlaneReady: 1
          reports:
            nodesPath: /tmp/deck/reports/bootstrap-nodes.txt
