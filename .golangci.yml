version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - gocritic
    - gosec
    - errcheck
    - govet
    - bodyclose
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: '.*_test\.go'
        linters:
          - gosec
        text: 'G(204|301|302|304|306)'
      - linters:
          - gosec
        text: 'G(101|110|117|122|204|301|302|304|306|703|705)'

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - default
        - prefix(github.com/taedi90/deck)
    gofumpt:
      module-path: github.com/taedi90/deck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
