version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - gocritic
    - gosec
    - errcheck
    - govet
    - bodyclose
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: '.*_test\.go'
        linters:
          - gosec
        text: 'G(204|301|302|304|306)'
      - path: 'cmd/deck/cmd_serve\.go'
        linters:
          - gosec
        text: 'G101'
      - path: 'internal/server/http_audit\.go'
        linters:
          - gosec
        text: 'G101'
      - path: 'cmd/deck/server_defaults\.go'
        linters:
          - gosec
        text: 'G117'
      - path: 'internal/server/http_(browse|static)\.go'
        linters:
          - gosec
        text: 'G705'
      - path: 'internal/install/fileops\.go'
        linters:
          - gosec
        text: 'G703'
      - path: 'internal/install/package_repo_policy\.go'
        linters:
          - gosec
        text: 'G703'
      - path: 'internal/install/steps_files\.go'
        linters:
          - gosec
        text: 'G703'
      - path: 'internal/install/steps_system\.go'
        linters:
          - gosec
        text: 'G703'
      - path: 'internal/preparecli/service\.go'
        linters:
          - gosec
        text: 'G703'
      - path: 'internal/bundle/collect\.go'
        linters:
          - gosec
        text: 'G122'
      - path: 'internal/preparecli/service\.go'
        linters:
          - gosec
        text: 'G122'
      - path: 'internal/executil/exec\.go'
        linters:
          - gosec
        text: 'G204'
      - path: 'internal/fsutil/safe_paths\.go'
        linters:
          - gosec
        text: 'G304'
      - path: 'internal/applycli/request\.go'
        linters:
          - gosec
        text: 'G301'
      - path: 'internal/bundle/(collect|import|merge)\.go'
        linters:
          - gosec
        text: 'G301'
      - path: 'internal/install/steps_(containerd|download|files|install_artifacts)\.go'
        linters:
          - gosec
        text: 'G301'
      - path: 'internal/prepare/(download_file|download_images|download_packages|runner)\.go'
        linters:
          - gosec
        text: 'G301'
      - path: 'internal/preparecli/service\.go'
        linters:
          - gosec
        text: 'G301'
      - path: 'internal/server/tls\.go'
        linters:
          - gosec
        text: 'G301'
      - path: 'internal/site/store/(releases|storage)\.go'
        linters:
          - gosec
        text: 'G301'

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - default
        - prefix(github.com/taedi90/deck)
    gofumpt:
      module-path: github.com/taedi90/deck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
